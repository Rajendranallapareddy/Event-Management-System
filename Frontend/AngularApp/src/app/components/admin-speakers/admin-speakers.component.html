<div class="container mt-4">
  <div class="d-flex justify-content-between align-items-center mb-3">
    <h2>Manage Speakers</h2>
    <button class="btn btn-primary" (click)="openModal()">+ Add Speaker</button>
  </div>
  <div *ngIf="loading" class="text-center">Loading...</div>
  <div class="row">
    <div class="col-md-4 mb-3" *ngFor="let s of speakers">
      <div class="card h-100">
        <div class="card-body">
          <h5>{{ s.name }}</h5>
          <p class="mb-1"><strong>Designation:</strong> {{ s.designation || 'N/A' }}</p>
          <p class="mb-1"><strong>Company:</strong> {{ s.company || 'N/A' }}</p>
          <p class="mb-1"><strong>Bio:</strong> {{ (s.bio | slice:0:100) || 'N/A' }}</p>
          <button class="btn btn-sm btn-danger mt-2" (click)="deleteSpeaker(s.speakerId)">Delete</button>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Add/Edit Speaker Modal (Reactive Form with all fields) -->
<div class="modal fade" [class.show]="showModal" style="display: block;" tabindex="-1" *ngIf="showModal">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header"><h5>Add Speaker</h5><button type="button" class="btn-close" (click)="showModal=false"></button></div>
      <div class="modal-body">
        <form [formGroup]="speakerForm">
          <div class="mb-2">
            <label>Name *</label>
            <input type="text" class="form-control" formControlName="name">
            <div class="text-danger" *ngIf="speakerForm.get('name')?.invalid && speakerForm.get('name')?.touched">Name required</div>
          </div>
          <div class="mb-2">
            <label>Designation (e.g., Principal Scientist)</label>
            <input type="text" class="form-control" formControlName="designation">
          </div>
          <div class="mb-2">
            <label>Company</label>
            <input type="text" class="form-control" formControlName="company">
          </div>
          <div class="mb-2">
            <label>Bio (short description)</label>
            <textarea class="form-control" rows="3" formControlName="bio"></textarea>
          </div>
        </form>
      </div>
      <div class="modal-footer"><button class="btn btn-primary" (click)="addSpeaker()" [disabled]="speakerForm.invalid">Save</button></div>
    </div>
  </div>
</div>
