<div class="container mt-4">
  <h2 class="mb-4">All Events</h2>

  <div *ngIf="loading" class="text-center">
    <div class="spinner-border text-primary" role="status">
      <span class="visually-hidden">Loading...</span>
    </div>
  </div>

  <div *ngIf="error" class="alert alert-danger">{{ error }}</div>

  <div class="row g-4">
    <div class="col-md-6 col-lg-4" *ngFor="let event of events">
      <div class="card h-100 shadow-sm">
        <img [src]="event.imageUrl || 'assets/default-event.jpg'" class="card-img-top" alt="Event image" style="height: 180px; object-fit: cover;">
        <div class="card-body">
          <h5 class="card-title">{{ event.title }}</h5>
          <p class="card-text">{{ event.description | slice:0:100 }}...</p>
          <p class="mb-1"><strong>Date:</strong> {{ event.startDate | date:'mediumDate' }}</p>
          <p class="mb-1"><strong>Location:</strong> {{ event.location }}</p>
          <a [routerLink]="['/events', event.eventId]" class="btn btn-outline-primary mt-2">View Details</a>
        </div>
      </div>
    </div>
  </div>

  <div class="d-flex justify-content-between align-items-center mt-4" *ngIf="totalPages > 0">
    <button class="btn btn-secondary" (click)="prevPage()" [disabled]="currentPage === 1">Previous</button>
    <span>Page {{ currentPage }} of {{ totalPages }}</span>
    <button class="btn btn-secondary" (click)="nextPage()" [disabled]="currentPage === totalPages">Next</button>
  </div>
</div>
