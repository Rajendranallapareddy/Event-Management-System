<div class="container mt-4">
  <div class="text-center mb-5">
    <h1 class="display-4 fw-bold text-primary">Welcome to Virtual Event Management System</h1>
    <p class="lead">Discover amazing events, connect with experts, and register easily</p>
  </div>

  <div *ngIf="loading" class="text-center">Loading events...</div>
  <div *ngIf="error" class="alert alert-danger">{{ error }}</div>

  <div class="row g-4">
    <div class="col-md-6 col-lg-4" *ngFor="let event of events">
      <div class="card h-100 shadow-sm">
        <img [src]="event.imageUrl || 'assets/default-event.jpg'" class="card-img-top" alt="Event" style="height: 200px; object-fit: cover;">
        <div class="card-body">
          <h5 class="card-title">{{ event.title }}</h5>
          <p class="card-text">{{ event.description | slice:0:100 }}...</p>
          <p><strong>{{ event.startDate | date:'mediumDate' }}</strong> at {{ event.location }}</p>
          <a [routerLink]="['/events', event.eventId]" class="btn btn-primary">View Details</a>
        </div>
      </div>
    </div>
  </div>
</div>
