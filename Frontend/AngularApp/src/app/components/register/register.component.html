<div class="row justify-content-center mt-5">
  <div class="col-md-6 col-lg-5">
    <div class="card shadow">
      <div class="card-header bg-success text-white text-center">
        <h4><i class="fas fa-user-plus me-2"></i>Register</h4>
      </div>
      <div class="card-body">
        <form [formGroup]="registerForm" (ngSubmit)="onSubmit()">
          <div class="mb-3">
            <label class="form-label">Full Name</label>
            <input type="text" class="form-control" formControlName="FullName">
            <div class="text-danger" *ngIf="registerForm.get('FullName')?.invalid && registerForm.get('FullName')?.touched">
              Required, max 100 chars
            </div>
          </div>
          <div class="mb-3">
            <label class="form-label">Email</label>
            <input type="email" class="form-control" formControlName="Email">
            <div class="text-danger" *ngIf="registerForm.get('Email')?.invalid && registerForm.get('Email')?.touched">
              Valid email required
            </div>
          </div>
          <div class="mb-3">
            <label class="form-label">Password</label>
            <input type="password" class="form-control" formControlName="Password">
            <div class="text-danger" *ngIf="registerForm.get('Password')?.invalid && registerForm.get('Password')?.touched">
              Password (min 6 chars)
            </div>
          </div>
          <div class="mb-3">
            <label class="form-label">Confirm Password</label>
            <input type="password" class="form-control" formControlName="ConfirmPassword">
            <div class="text-danger" *ngIf="registerForm.hasError('mismatch') && registerForm.get('ConfirmPassword')?.touched">
              Passwords do not match
            </div>
          </div>
          <div class="alert alert-success" *ngIf="successMessage">{{ successMessage }}</div>
          <div class="alert alert-danger" *ngIf="errorMessage">{{ errorMessage }}</div>
          <button type="submit" class="btn btn-success w-100" [disabled]="loading">
            {{ loading ? 'Registering...' : 'Register' }}
          </button>
        </form>
        <hr>
        <p class="text-center mb-0">Already have an account? <a routerLink="/login">Login</a></p>
      </div>
    </div>
  </div>
</div>
