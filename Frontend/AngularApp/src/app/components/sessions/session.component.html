<div class="container mt-4">
  <div class="d-flex justify-content-between align-items-center mb-3">
    <h2>Manage Sessions</h2>
    <button class="btn btn-primary" (click)="openCreateModal()">+ Add Session</button>
  </div>
  <div *ngIf="loading" class="text-center">Loading...</div>
  <table class="table table-striped" *ngIf="!loading && sessions.length">
    <thead>
      <tr><th>Title</th><th>Event</th><th>Speaker</th><th>Start</th><th>Actions</th></tr>
    </thead>
    <tbody>
      <tr *ngFor="let s of sessions">
        <td>{{ s.title }}</td>
        <td>{{ s.eventTitle }}</td>
        <td>{{ s.speakerName || 'None' }}</td>
        <td>{{ s.sessionStart | date:'short' }}</td>
        <td>
          <button class="btn btn-sm btn-info me-2" (click)="openAssignModal(s.sessionId)">Assign</button>
          <button class="btn btn-sm btn-danger" (click)="deleteSession(s.sessionId)">Delete</button>
        </td>
      </tr>
    </tbody>
  </table>
</div>

<!-- Create Session Modal (Reactive Form) -->
<div class="modal fade" [class.show]="showCreateModal" style="display: block;" tabindex="-1" *ngIf="showCreateModal">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header"><h5>New Session</h5><button type="button" class="btn-close" (click)="showCreateModal=false"></button></div>
      <div class="modal-body">
        <form [formGroup]="sessionForm">
          <select class="form-select mb-2" formControlName="eventId">
            <option value="0">Select Event</option>
            <option *ngFor="let e of events" [value]="e.eventId">{{ e.title }}</option>
          </select>
          <div class="text-danger" *ngIf="sessionForm.get('eventId')?.invalid && sessionForm.get('eventId')?.touched">Event required</div>

          <input type="text" class="form-control mb-2" placeholder="Title" formControlName="title">
          <div class="text-danger" *ngIf="sessionForm.get('title')?.invalid && sessionForm.get('title')?.touched">Title required</div>

          <textarea class="form-control mb-2" placeholder="Description" formControlName="description"></textarea>

          <select class="form-select mb-2" formControlName="speakerId">
            <option value="">No Speaker</option>
            <option *ngFor="let sp of speakers" [value]="sp.speakerId">{{ sp.name }}</option>
          </select>

          <input type="datetime-local" class="form-control mb-2" formControlName="sessionStart">
          <div class="text-danger" *ngIf="sessionForm.get('sessionStart')?.invalid && sessionForm.get('sessionStart')?.touched">Start time required</div>

          <input type="datetime-local" class="form-control mb-2" formControlName="sessionEnd">
          <div class="text-danger" *ngIf="sessionForm.get('sessionEnd')?.invalid && sessionForm.get('sessionEnd')?.touched">End time required</div>
        </form>
      </div>
      <div class="modal-footer"><button class="btn btn-primary" (click)="createSession()" [disabled]="sessionForm.invalid">Create</button></div>
    </div>
  </div>
</div>

<!-- Assign Speaker Modal (Reactive Form) -->
<div class="modal fade" [class.show]="showAssignModal" style="display: block;" tabindex="-1" *ngIf="showAssignModal">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header"><h5>Assign Speaker</h5><button type="button" class="btn-close" (click)="showAssignModal=false"></button></div>
      <div class="modal-body">
        <form [formGroup]="assignForm">
          <select class="form-select" formControlName="speakerId">
            <option value="0">Select Speaker</option>
            <option *ngFor="let sp of speakers" [value]="sp.speakerId">{{ sp.name }}</option>
          </select>
          <div class="text-danger" *ngIf="assignForm.get('speakerId')?.invalid && assignForm.get('speakerId')?.touched">Speaker required</div>
        </form>
      </div>
      <div class="modal-footer"><button class="btn btn-primary" (click)="assignSpeaker()" [disabled]="assignForm.invalid">Assign</button></div>
    </div>
  </div>
</div>
